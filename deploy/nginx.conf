# nginx 反向代理設定
# 放置路徑：/etc/nginx/sites-available/sentiment-bot
# 啟用：sudo ln -s /etc/nginx/sites-available/sentiment-bot /etc/nginx/sites-enabled/
# 重載：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_SERVER_DOMAIN_OR_IP;  # ← 填入 server domain 或 IP

    # 將 LINE Webhook 請求轉發給本機 Flask
    location /callback {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

